# SPP 3-Router Test Topology
# ═══════════════════════════════════════════════════════════
#
#   sender ──(net_sa)── router_a ──(net_ab)── router_b
#                          │                      │
#                       (net_ac)               (net_br)
#                          │                      │
#                       router_c ──(net_cr)── receiver
#
# Each subnet is a /24 matching the addresses in configs/.
# ═══════════════════════════════════════════════════════════

services:

  # ── Receiver (must start first) ──────────────────────────
  receiver:
    build: .
    container_name: spp-receiver
    command: ["./bin/receiver", "configs/receiver.json"]
    networks:
      net_br:
        ipv4_address: 10.0.4.2
      net_cr:
        ipv4_address: 10.0.5.2
    restart: unless-stopped

  # ── Router A (hub — connects to sender, B, C) ───────────
  router_a:
    build: .
    container_name: spp-router-a
    command: ["./bin/router", "configs/router_a.json"]
    networks:
      net_sa:
        ipv4_address: 10.0.1.2
      net_ab:
        ipv4_address: 10.0.2.1
      net_ac:
        ipv4_address: 10.0.3.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router B ─────────────────────────────────────────────
  router_b:
    build: .
    container_name: spp-router-b
    command: ["./bin/router", "configs/router_b.json"]
    networks:
      net_ab:
        ipv4_address: 10.0.2.2
      net_br:
        ipv4_address: 10.0.4.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router C ─────────────────────────────────────────────
  router_c:
    build: .
    container_name: spp-router-c
    command: ["./bin/router", "configs/router_c.json"]
    networks:
      net_ac:
        ipv4_address: 10.0.3.2
      net_cr:
        ipv4_address: 10.0.5.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Sender (runs once, then exits) ──────────────────────
  sender:
    build: .
    container_name: spp-sender
    command: ["./bin/sender", "configs/sender.json"]
    networks:
      net_sa:
        ipv4_address: 10.0.1.1
    depends_on:
      - router_a
      - router_b
      - router_c
    restart: "no"

# ── Networks ───────────────────────────────────────────────
networks:
  net_sa:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
          gateway: 10.0.1.254

  net_ab:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
          gateway: 10.0.2.254

  net_ac:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.3.0/24
          gateway: 10.0.3.254

  net_br:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.4.0/24
          gateway: 10.0.4.254

  net_cr:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.5.0/24
          gateway: 10.0.5.254
