# SPP 7-Router Latency Test Topology
# ═══════════════════════════════════════════════════════════════
#
#                     ┌─── router_b ─── router_d ───┐
#   sender → router_a ──┤                              ├── router_g → receiver
#                     ├─── router_c ─── router_e ───┘
#                     └─── router_f ────────────────────────→ receiver
#
# Path 1 (highway):  sender → A → B → D → G → receiver  (4 hops)
# Path 2 (alternate): sender → A → C → E → G → receiver  (4 hops)
# Path 3 (shortcut):  sender → A → F → receiver           (2 hops)
#
# 10 subnets: net_sa, net_ab, net_ac, net_af, net_bd, net_ce, net_dg, net_eg, net_gr, net_fr
# ═══════════════════════════════════════════════════════════════

services:

  # ── Receiver (must start first) ──────────────────────────────
  receiver:
    build: .
    container_name: spp-receiver
    command: ["./bin/receiver", "configs/topologies/7router/receiver.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_gr:
        ipv4_address: 10.1.9.2
      net_fr:
        ipv4_address: 10.1.10.2
      net_sr:
        ipv4_address: 10.1.11.2
    restart: unless-stopped

  # ── Router A (hub — connects to sender, B, C, F) ────────────
  router_a:
    build: .
    container_name: spp-router-a
    command: ["./bin/router", "configs/topologies/7router/router_a.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_sa:
        ipv4_address: 10.1.1.2
      net_ab:
        ipv4_address: 10.1.2.1
      net_ac:
        ipv4_address: 10.1.3.1
      net_af:
        ipv4_address: 10.1.4.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router B (highway path — A → B → D) ─────────────────────
  router_b:
    build: .
    container_name: spp-router-b
    command: ["./bin/router", "configs/topologies/7router/router_b.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_ab:
        ipv4_address: 10.1.2.2
      net_bd:
        ipv4_address: 10.1.5.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router C (alternate path — A → C → E) ──────────────────
  router_c:
    build: .
    container_name: spp-router-c
    command: ["./bin/router", "configs/topologies/7router/router_c.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_ac:
        ipv4_address: 10.1.3.2
      net_ce:
        ipv4_address: 10.1.6.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router D (highway path — B → D → G) ────────────────────
  router_d:
    build: .
    container_name: spp-router-d
    command: ["./bin/router", "configs/topologies/7router/router_d.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_bd:
        ipv4_address: 10.1.5.2
      net_dg:
        ipv4_address: 10.1.7.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router E (alternate path — C → E → G) ──────────────────
  router_e:
    build: .
    container_name: spp-router-e
    command: ["./bin/router", "configs/topologies/7router/router_e.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_ce:
        ipv4_address: 10.1.6.2
      net_eg:
        ipv4_address: 10.1.8.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router F (shortcut — A → F → receiver) ─────────────────
  router_f:
    build: .
    container_name: spp-router-f
    command: ["./bin/router", "configs/topologies/7router/router_f.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_af:
        ipv4_address: 10.1.4.2
      net_fr:
        ipv4_address: 10.1.10.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Router G (merge point — D/E → G → receiver) ────────────
  router_g:
    build: .
    container_name: spp-router-g
    command: ["./bin/router", "configs/topologies/7router/router_g.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_dg:
        ipv4_address: 10.1.7.2
      net_eg:
        ipv4_address: 10.1.8.2
      net_gr:
        ipv4_address: 10.1.9.1
    depends_on:
      - receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/healthz"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ── Sender (runs once, then exits) ──────────────────────────
  sender:
    build: .
    container_name: spp-sender
    command: ["./bin/sender", "configs/topologies/7router/sender.json"]
    cap_add:
      - NET_ADMIN
    networks:
      net_sa:
        ipv4_address: 10.1.1.1
      net_sr:
        ipv4_address: 10.1.11.1
    depends_on:
      - router_a
      - router_b
      - router_c
      - router_d
      - router_e
      - router_f
      - router_g
    restart: "no"

# ── Networks ─────────────────────────────────────────────────
networks:
  net_sa:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.1.0/24
          gateway: 10.1.1.254

  net_ab:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.2.0/24
          gateway: 10.1.2.254

  net_ac:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.3.0/24
          gateway: 10.1.3.254

  net_af:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.4.0/24
          gateway: 10.1.4.254

  net_bd:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.5.0/24
          gateway: 10.1.5.254

  net_ce:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.6.0/24
          gateway: 10.1.6.254

  net_dg:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.7.0/24
          gateway: 10.1.7.254

  net_eg:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.8.0/24
          gateway: 10.1.8.254

  net_gr:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.9.0/24
          gateway: 10.1.9.254

  net_fr:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.10.0/24
          gateway: 10.1.10.254

  # Direct sender↔receiver link — used only for overhead measurement (no routers)
  net_sr:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.11.0/24
          gateway: 10.1.11.254
